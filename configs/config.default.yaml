# AI Model Scheduler - Default Configuration

server:
  port: 8080
  mode: debug  # debug, release, test
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

jwt:
  secret: "change-this-secret-key-in-production"
  expire: 720h  # 30 days
  refresh_expire: 8760h  # 1 year

database:
  driver: postgres  # postgres, mysql
  host: localhost
  port: 5432
  username: qqq
  password: 
  database: ai-api
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 1h

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100

rate_limit:
  enabled: true
  global_qps: 1000
  user_qps: 10
  user_daily_requests: 1000
  api_key_qps: 50

model_providers:
  - name: openai
    display_name: OpenAI
    base_url: https://api.openai.com/v1
    api_key: ""
    enabled: true
    priority: 1
    weight: 100

  - name: claude
    display_name: Anthropic Claude
    base_url: https://api.anthropic.com/v1
    api_key: ""
    enabled: false
    priority: 2
    weight: 100

  - name: gemini
    display_name: Google Gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: ""
    enabled: false
    priority: 3
    weight: 100

billing:
  currency: USD
  default_input_price: 0.001  # $/1K tokens
  default_output_price: 0.003  # $/1K tokens

subscription:
  free_tier:
    daily_token_limit: 10000
    monthly_budget: 10
    max_qps: 5
  pro_tier:
    daily_token_limit: 1000000
    monthly_budget: 500
    max_qps: 100

log:
  level: info  # debug, info, warn, error
  format: json  # json, console
  output: stdout  # stdout, file
  file_path: logs/app.log
  max_size: 100  # MB
  max_backups: 5
  max_age: 30  # days

monitoring:
  enabled: true
  prometheus_port: 9090
  metrics_path: /metrics
