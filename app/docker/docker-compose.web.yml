version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: ai-scheduler-postgres
    environment:
      POSTGRES_DB: ai_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-scheduler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # App (Backend + Frontend)
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    container_name: ai-scheduler-app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123456
      DB_NAME: ai_scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ../../configs:/app/configs
    restart: always

volumes:
  postgres_data:
  redis_data:
